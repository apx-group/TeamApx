services:
  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
    image: ghcr.io/apx-group/apx-web:latest
    container_name: apx-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - FRONTEND_DIR=/app/frontend/dist
      - UPLOAD_DIR=/app/uploads
      - SMTP_PORT=${SMTP_PORT:-587}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
      - DEV_NEON_DATABASE_URL=
    volumes:
      - ../../public/uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - apx-stats-net

networks:
  apx-stats-net:
    external: true
