version: "3.8"

services:
  backend:
    build: ./backend
    container_name: apx-backend
    restart: unless-stopped
    environment:
      - USER_DB_PATH=/data/users.db
      - DATA_DB_PATH=/data/data.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin1234}
      - MASTERPASSWORD=${MASTERPASSWORD}
      - UPLOAD_DIR=/app/uploads
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - DISCORD_CLIENT_SECRET=${DISCORD_CLIENT_SECRET}
      - DISCORD_REDIRECT_URI=${DISCORD_REDIRECT_URI}
      - APP_BASE_URL=${APP_BASE_URL}
      - CM_CLIENT_ID=${CM_CLIENT_ID}
      - CM_CLIENT_SECRET=${CM_CLIENT_SECRET}
      - CM_REDIRECT_URI=${CM_REDIRECT_URI}
      - CM_USERINFO_URL=${CM_USERINFO_URL}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
      - TWITCH_REDIRECT_URI=${TWITCH_REDIRECT_URI}
    volumes:
      - ./data:/data
      - ./public/uploads:/app/uploads
    expose:
      - "8080"
    networks:
      - apx

  nginx:
    image: linuxserver/nginx:latest
    container_name: apx-team.com
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./nginx/site-confs:/config/nginx/site-confs
      - ./nginx/log:/config/log/nginx
      # Frontend-Dateien
      - ./index.html:/config/www/index.html
      - ./rainbow-six.html:/config/www/rainbow-six.html
      - ./src:/config/www/src
      - ./assets:/config/www/assets
      - ./de:/config/www/de
      - ./en:/config/www/en
      - ./nginx/error-pages:/config/www/error-pages
      - ./public/uploads:/config/www/public/uploads
    ports:
      - "3333:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - apx

networks:
  apx:
    driver: bridge
